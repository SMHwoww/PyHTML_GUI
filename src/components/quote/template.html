<blockquote class="quote-component" style="border-left-color: {{ border_color }}; background-color: {{ bg_color }}; color: {{ text_color }}; font-family: {{ font_family }}; font-size: {{ font_family_size }}px;">
  <p class="quote-text">{{ text | replace('\n', '<br>') }}</p>
  {% if author %}
  <footer class="quote-author">— {{ author }}</footer>
  {% endif %}
</blockquote>
