<div class="card" style="width: {{ width }}px; background-color: {{ bg_color }}; color: {{ text_color }}; font-family: {{ font }}; border: 1px solid {{ border_color }}; text-align: {{ alignment }};">
  <div class="card-header">
    <h3 style="margin: 0; padding: 15px;">{{ title }}</h3>
  </div>
  <div class="card-body" style="padding: 15px;">
    {{ content }}
  </div>
</div>
