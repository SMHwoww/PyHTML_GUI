<form class="form" action="{{ form_action }}" method="{{ form_method }}" style="width: {{ width }}px; background-color: {{ bg_color }}; color: {{ text_color }}; font-family: {{ font }}; padding: 20px; border-radius: 8px;">
  <div style="text-align: {{ alignment }};">
  <h2 style="margin-top: 0;">{{ title }}</h2>
  <div style="display: inline-block; text-align: left;">
  {% if show_name %}
  <div class="form-group" style="margin-bottom: 15px;">
    <label for="name" style="display: block; margin-bottom: 5px;">姓名:</label>
    <input type="text" id="name" name="name" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px;">
  </div>
  {% endif %}
  
  {% if show_email %}
  <div class="form-group" style="margin-bottom: 15px;">
    <label for="email" style="display: block; margin-bottom: 5px;">邮箱:</label>
    <input type="email" id="email" name="email" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px;">
  </div>
  {% endif %}
  
  {% if show_subject %}
  <div class="form-group" style="margin-bottom: 15px;">
    <label for="subject" style="display: block; margin-bottom: 5px;">主题:</label>
    <input type="text" id="subject" name="subject" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px;">
  </div>
  {% endif %}
  
  {% if show_message %}
  <div class="form-group" style="margin-bottom: 15px;">
    <label for="message" style="display: block; margin-bottom: 5px;">消息:</label>
    <textarea id="message" name="message" rows="4" style="width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px;"></textarea>
  </div>
  {% endif %}
  
  <button type="submit" style="background-color: {{ button_color }}; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-family: {{ font }};">
    {{ submit_text }}
  </button>
  </div>
  </div>
</form>
