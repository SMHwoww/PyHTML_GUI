{% if list_type == '有序列表' %}
<ol style="color: {{ text_color }}; font-family: {{ font }}; line-height: {{ spacing + 16 }}px;">
  {% for item in items.split('\n') %}
  <li>{{ item.strip() }}</li>
  {% endfor %}
</ol>
{% else %}
<ul style="color: {{ text_color }}; font-family: {{ font }}; line-height: {{ spacing + 16 }}px;">
  {% for item in items.split('\n') %}
  <li>{{ item.strip() }}</li>
  {% endfor %}
</ul>
{% endif %}
