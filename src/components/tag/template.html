<div class="tag-container" style="text-align: {{ alignment }};">
  <div 
    class="tag-component" 
    style="
      display: inline-flex;
      align-items: center;
      background-color: {{ color }};
      color: {{ text_color }};
      font-size: {{ font_size }}px;
      padding: 0 {{ padding }}px;
      height: {{ font_size * 1.8 }}px;
      border-radius: {{ border_radius }}px;
      margin: 0 {{ padding / 2 }}px {{ padding / 2 }}px 0;
    "
  >
    <span class="tag-text">{{ text }}</span>
    {% if show_close %}
    <button 
      class="tag-close" 
      style="
        margin-left: {{ padding / 2 }}px;
        background: none;
        border: none;
        color: {{ text_color }};
        font-size: {{ font_size * 1.2 }}px;
        cursor: pointer;
        line-height: 1;
        padding: 0;
      "
    >
      ×
    </button>
    {% endif %}
  </div>
</div>
