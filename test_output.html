<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试项目</title>
    <style>
        .marquee-component {
          padding: 15px;
          background-color: #f0f0f0;
          border-radius: 4px;
          margin: 10px 0;
        }
        
        .marquee-component marquee {
          font-size: 18px;
          font-weight: bold;
        }
        .headline-component {
          font-family: "Microsoft YaHei", "SimHei", sans-serif;
          margin: 20px 0;
          line-height: 1.4;
        }
        
        h1.headline-component {
          font-size: 36px;
          font-weight: bold;
        }
        
        h2.headline-component {
          font-size: 28px;
          font-weight: bold;
        }
        
        h3.headline-component {
          font-size: 22px;
          font-weight: 600;
        }
        
        h4.headline-component {
          font-size: 18px;
          font-weight: 600;
        }
    </style>
</head>
<body>
<div class="marquee-component" style="background-color: #f0f0f0;">
  <marquee 
    scrollamount="5" 
    direction="left"
    style="color: #000000; font-family: SimSun; font-size: px;"
  >
    欢迎使用pyHTML！这是一个测试页面。
  </marquee>
</div>
<h1 class="headline-component" style="text-align: center; color: #333333; font-family: SimHei; font-size: px;">
  我的第一个报纸页面
</h1>
</body>
</html>
